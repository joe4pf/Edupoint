<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EduPoint — Espace Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="data.js"></script>
</head>
<body>

<!-- DRAWER OVERLAY (mobile) -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-inner">
        <div class="sb-logo-icon">🎓</div>
        <div><div class="sb-logo-text">EduPoint</div><div class="sb-logo-ver">Espace Admin</div></div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-section-title">Navigation</div>
      <a class="nav-item active" href="#" id="nav-dashboard"></a>
      <a class="nav-item" href="#" id="nav-presence"></a>
      <a class="nav-item" href="#" id="nav-historique"></a>
      <a class="nav-item" href="#" id="nav-statistiques"></a>
      <a class="nav-item" href="#" id="nav-gestion"></a>
      <a class="nav-item" href="#" id="nav-pointage"></a>
    </div>
    <div class="sb-bottom">
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">??</div>
        <div><div class="user-name" id="userName">—</div><div class="user-role">Administrateur</div></div>
      </div>
      <button class="btn-logout" id="btnLogout"></button>
    </div>
  </div>
  <div class="main-area">
    <div class="topbar">
      <button class="burger-btn" onclick="openDrawer()" aria-label="Menu"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title" id="pageTitle">Tableau de bord</div>
      <div class="topbar-right">
        <span class="firebase-badge" id="fbBadge" onclick="openFirebaseModal()" title="Configurer Firebase">🔥 Firebase</span>
        <span class="clock-badge mono" id="clock">--:--:--</span>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>
<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

<script>
var navDefs = [
  {id:'dashboard',    icon:ICO.home,     label:'Tableau de bord'},
  {id:'presence',     icon:ICO.users,    label:'Présences du jour'},
  {id:'historique',   icon:ICO.history,  label:'Historique'},
  {id:'statistiques', icon:ICO.chart,    label:'Statistiques'},
  {id:'gestion',      icon:ICO.settings, label:'Gestion comptes'},
  {id:'pointage',     icon:ICO.clock,    label:'Mon pointage'},
];
navDefs.forEach(function(n){
  document.getElementById('nav-'+n.id).innerHTML = n.icon + '<span>'+n.label+'</span>';
  document.getElementById('nav-'+n.id).addEventListener('click', function(e){ e.preventDefault(); setSection(n.id); });
});
document.getElementById('btnLogout').innerHTML = ICO.logout + ' Déconnexion';
document.getElementById('btnLogout').onclick = logout;

var currentUser = loadSession();
if (!currentUser || currentUser.role !== 'admin') { window.location.href = 'index.html'; }
document.getElementById('userAvatar').textContent = currentUser.prenom[0] + currentUser.nom[0];
document.getElementById('userName').textContent = currentUser.prenom + ' ' + currentUser.nom;

setInterval(function(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR'); }, 1000);
// Rafraîchissement automatique toutes les 30s pour voir les nouveaux pointages
setInterval(function(){ 
  try {
    var raw = localStorage.getItem('edupoint_pointages');
    if (raw) POINTAGES = JSON.parse(raw);
    var rawU = localStorage.getItem('edupoint_users');
    if (rawU) USERS = JSON.parse(rawU);
  } catch(e) {}
  render(); 
}, 10000);

var toastTimer;
function showToast(msg, type) {
  type = type||'success';
  var t = document.getElementById('toast');
  t.className = 'toast show ' + type;
  document.getElementById('toastIcon').textContent = type==='success'?'✓':'!';
  document.getElementById('toastMsg').textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className='toast'; }, 3000);
}

function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });

var section = 'dashboard';
var myChart = null;
var presFiltrClasse='', presFiltrDate=getToday(), presFiltrSearch='', presFiltrFiliere='', presFiltrNiveau='';
var histSearch='', histFiliere='', histNiveau='';
var gestSearch='';

// Callback pour les mises à jour inter-onglets et Firebase
function onDataUpdated() { render(); }

function setSection(s) {
  section = s;
  var titles = {dashboard:'Tableau de bord',presence:'Présences du jour',historique:'Historique complet',statistiques:'Statistiques',gestion:'Gestion des comptes',pointage:'Mon pointage'};
  document.getElementById('pageTitle').textContent = titles[s]||s;
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('nav-'+s).classList.add('active');
  if (myChart) { try{myChart.destroy();}catch(e){} myChart=null; }
  render(); window.scrollTo(0,0);
}

function badge(statut){ var txt=statut==='present'?'Présent':statut==='retard'?'Retard':'Absent'; return '<span class="badge '+statut+'">'+txt+'</span>'; }
function statCard(val,lbl,color,icon){ return '<div class="stat-card c-'+color+'"><div class="stat-icon">'+icon+'</div><div class="stat-val">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>'; }

function render() {
  if (section==='dashboard') renderDashboard();
  else if (section==='presence') renderPresence();
  else if (section==='historique') renderHistorique();
  else if (section==='statistiques') renderStats();
  else if (section==='gestion') renderGestion();
  else if (section==='pointage') renderPointage();
}

// ── DASHBOARD ──
function renderDashboard() {
  var s = getStudents();
  // Recharger depuis localStorage à chaque rendu du dashboard
  try { var rp=localStorage.getItem('edupoint_pointages'); if(rp) POINTAGES=JSON.parse(rp); } catch(e){}
  try { var ru=localStorage.getItem('edupoint_users'); if(ru) USERS=JSON.parse(ru); } catch(e){}
  var pres = s.filter(function(x){ var p=getP(x.id); return p&&p.statut!=='absent'; }).length;
  var abs = s.length - pres;
  var ret = POINTAGES.filter(function(p){ return p.date===getToday()&&p.statut==='retard'; }).length;
  var profsPresents = getProfs().filter(function(x){ var p=getP(x.id); return p&&p.statut!=='absent'; }).length;

  var weekData = [];
  for (var i=6;i>=0;i--) {
    var d=new Date(); d.setDate(d.getDate()-i);
    var ds=d.toISOString().split('T')[0];
    var dp=POINTAGES.filter(function(p){return p.date===ds;});
    weekData.push({day:d.toLocaleDateString('fr-FR',{weekday:'short'}), presents:dp.filter(function(p){return p.statut==='present'||p.statut==='retard';}).length, absents:dp.filter(function(p){return p.statut==='absent';}).length, retards:dp.filter(function(p){return p.statut==='retard';}).length});
  }

  document.getElementById('mainContent').innerHTML =
    '<div class="section-head"><div><div class="page-title">Tableau de bord 📊</div><div class="page-sub">'+fmtFull()+' — Mise à jour en temps réel</div></div>' +
    '<button class="btn-export" onclick="forceRefresh()" style="background:rgba(0,212,170,.08)">🔄 Actualiser</button></div>' +
    '<div class="stats-grid">' +
      statCard(s.length,'Total étudiants','blue',ICO.users) +
      statCard(getProfs().length,'Professeurs','blue',ICO.user) +
      statCard(pres,"Présents aujourd'hui",'green',ICO.check) +
      statCard(abs,"Absents aujourd'hui",'red',ICO.xmark) +
      statCard(ret,'Retards','orange',ICO.warn) +
      statCard(profsPresents,'Profs présents','green',ICO.user) +
    '</div>' +
    '<div class="charts-grid">' +
      '<div class="chart-card"><div class="chart-title">Présences cette semaine</div><div class="chart-canvas-wrap"><canvas id="barChart"></canvas></div></div>' +
      '<div class="chart-card"><div class="chart-title">Répartition du jour</div><div class="chart-canvas-wrap"><canvas id="pieChart"></canvas></div>' +
        '<div class="pie-legend"><div class="pie-legend-item"><div class="pie-legend-dot" style="background:#2ed573"></div>Présents:<b style="color:var(--white);margin-left:4px">'+pres+'</b></div><div class="pie-legend-item"><div class="pie-legend-dot" style="background:#ff4757"></div>Absents:<b style="color:var(--white);margin-left:4px">'+abs+'</b></div><div class="pie-legend-item"><div class="pie-legend-dot" style="background:#ffa502"></div>Retards:<b style="color:var(--white);margin-left:4px">'+ret+'</b></div></div>' +
      '</div>' +
    '</div>';

  setTimeout(function(){
    var tf={color:'#7a8aaa',font:{family:'Sora'}};
    var ts={backgroundColor:'#0e1f35',borderColor:'rgba(0,212,170,.2)',borderWidth:1,titleColor:'#ccd6f6',bodyColor:'#ccd6f6',cornerRadius:8};
    var gc='rgba(255,255,255,.04)';
    var bc=document.getElementById('barChart');
    if(bc) new Chart(bc,{type:'bar',data:{labels:weekData.map(function(d){return d.day;}),datasets:[{label:'Présents',data:weekData.map(function(d){return d.presents;}),backgroundColor:'rgba(46,213,115,.75)',borderRadius:5},{label:'Absents',data:weekData.map(function(d){return d.absents;}),backgroundColor:'rgba(255,71,87,.75)',borderRadius:5},{label:'Retards',data:weekData.map(function(d){return d.retards;}),backgroundColor:'rgba(255,165,2,.75)',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:tf},tooltip:ts},scales:{x:{ticks:{color:'#7a8aaa'},grid:{color:gc}},y:{ticks:{color:'#7a8aaa'},grid:{color:gc}}}}});
    var pc=document.getElementById('pieChart');
    if(pc) new Chart(pc,{type:'doughnut',data:{labels:['Présents','Absents','Retards'],datasets:[{data:[pres,abs,ret],backgroundColor:['rgba(46,213,115,.8)','rgba(255,71,87,.8)','rgba(255,165,2,.8)'],borderColor:['#2ed573','#ff4757','#ffa502'],borderWidth:2,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:ts}}});
  }, 60);
}

function forceRefresh() {
  try {
    var raw = localStorage.getItem('edupoint_pointages');
    if (raw) POINTAGES = JSON.parse(raw);
    var rawU = localStorage.getItem('edupoint_users');
    if (rawU) USERS = JSON.parse(rawU);
  } catch(e) {}
  render();
  showToast('Données actualisées ✓');
}

// ── PRESENCE ──
function renderPresence() {
  // ── CORRECTION : inclure ÉTUDIANTS + PROFESSEURS dans la liste
  // et n'afficher QUE ceux qui ont effectivement pointé ce jour-là
  var tous = USERS.filter(function(u){ return u.role==='etudiant' || u.role==='professeur'; });

  // Appliquer les filtres de recherche
  tous = tous.filter(function(s){
    var ms = !presFiltrSearch || (s.nom+' '+s.prenom+' '+s.matricule).toLowerCase().indexOf(presFiltrSearch.toLowerCase()) >= 0;
    return ms;
  });

  // ── Ne garder QUE les personnes ayant un pointage pour presFiltrDate ──
  var pointeurs = tous.filter(function(s){
    var p = getP(s.id, presFiltrDate);
    return p !== undefined && p !== null;
  });

  var pres = pointeurs.filter(function(s){ var p=getP(s.id,presFiltrDate); return p&&p.statut!=='absent'; }).length;
  var abs  = pointeurs.filter(function(s){ var p=getP(s.id,presFiltrDate); return p&&p.statut==='absent'; }).length;
  var ret  = pointeurs.filter(function(s){ var p=getP(s.id,presFiltrDate); return p&&p.statut==='retard'; }).length;

  var rows = pointeurs.map(function(s){
    var p = getP(s.id, presFiltrDate);
    var roleTag = s.role==='professeur' ? '<span class="role-tag professeur" style="margin-left:6px;font-size:10px">Prof</span>' : '';
    return '<tr><td><b>'+s.nom+'</b> '+s.prenom+roleTag+'</td><td class="mono" style="font-size:12px;color:var(--text2)">'+s.matricule+'</td><td>'+(s.classe||'—')+'</td><td class="mono">'+(p&&p.entree?p.entree:'—')+'</td><td class="mono">'+(p&&p.sortie?p.sortie:'—')+'</td><td>'+badge(p?p.statut:'absent')+'</td></tr>';
  }).join('');

  document.getElementById('mainContent').innerHTML =
    '<div class="section-head"><div class="page-title">Présences en temps réel</div><button class="btn-export" onclick="exportCSV()">'+ICO.download+' Exporter CSV</button></div>' +
    '<div class="tbl-wrap" style="margin-bottom:20px"><div class="tbl-head"><div class="tbl-title">Filtres</div>' +
    '<div class="tbl-filters">' +
      '<input type="date" class="filter-inp" value="'+presFiltrDate+'" onchange="presFiltrDate=this.value;renderPresence()"/>' +
      '<input class="filter-inp" placeholder="Rechercher..." value="'+presFiltrSearch+'" oninput="presFiltrSearch=this.value;renderPresence()" style="min-width:160px"/>' +
    '</div></div></div>' +
    '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">'+statCard(pres,'Présents','green',ICO.check)+statCard(abs,'Absents','red',ICO.xmark)+statCard(ret,'Retards','orange',ICO.warn)+'</div>' +
    '<div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">Pointages du '+fmtDate(presFiltrDate)+' ('+pointeurs.length+' personne(s))</div></div>' +
    '<table><thead><tr><th>Nom & Prénom</th><th>Matricule</th><th>Classe / Matière</th><th>Entrée</th><th>Sortie</th><th>Statut</th></tr></thead>' +
    '<tbody>'+(rows||'<tr><td colspan="6"><div class="empty">Aucun pointage enregistré pour cette date</div></td></tr>')+'</tbody></table></div>';
}

// ── HISTORIQUE ──
function renderHistorique() {
  var stu = getStudents().filter(function(s){
    var mf = !histFiliere || s.classe.indexOf(histFiliere) === 0;
    var mn = !histNiveau  || s.classe.slice(-1) === histNiveau;
    var ms = !histSearch  || (s.nom+' '+s.prenom+' '+s.matricule).toLowerCase().indexOf(histSearch.toLowerCase()) >= 0;
    return mf && mn && ms;
  });
  var optF = '<option value="">Toutes les filières</option>';
  FILIERES.forEach(function(f){ optF += '<option value="'+f+'"'+(histFiliere===f?' selected':'')+'>'+f+'</option>'; });
  var optN = '<option value="">Tous les niveaux</option>';
  NIVEAUX.forEach(function(n){ optN += '<option value="'+n.val+'"'+(histNiveau===n.val?' selected':'')+'>'+n.label+'</option>'; });
  var rows='';
  stu.forEach(function(s){
    POINTAGES.filter(function(p){return p.userId===s.id;}).sort(function(a,b){return b.date.localeCompare(a.date);}).forEach(function(p){
      rows+='<tr><td><b>'+s.nom+'</b> '+s.prenom+'</td><td>'+s.classe+'</td><td>'+fmtDate(p.date)+'</td><td class="mono">'+(p.entree||'—')+'</td><td class="mono">'+(p.sortie||'—')+'</td><td>'+badge(p.statut)+'</td></tr>';
    });
  });
  document.getElementById('mainContent').innerHTML =
    '<div class="section-head"><div class="page-title">Historique complet</div></div>' +
    '<div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">Tous les pointages</div>' +
    '<div class="tbl-filters">' +
      '<input class="filter-inp" placeholder="Rechercher..." value="'+histSearch+'" oninput="histSearch=this.value;renderHistorique()" style="min-width:150px"/>' +
      '<select class="filter-inp" onchange="histFiliere=this.value;renderHistorique()">'+optF+'</select>' +
      '<select class="filter-inp" onchange="histNiveau=this.value;renderHistorique()">'+optN+'</select>' +
    '</div></div>' +
    '<table><thead><tr><th>Nom & Prénom</th><th>Classe</th><th>Date</th><th>Entrée</th><th>Sortie</th><th>Statut</th></tr></thead>' +
    '<tbody>'+(rows||'<tr><td colspan="6"><div class="empty">Aucun résultat</div></td></tr>')+'</tbody></table></div>';
}

// ── STATISTIQUES ──
function renderStats() {
  var s = getStudents();
  var rows = s.map(function(st){
    var sp=POINTAGES.filter(function(p){return p.userId===st.id;});
    var pres=sp.filter(function(p){return p.statut==='present'||p.statut==='retard';}).length;
    var abs=sp.filter(function(p){return p.statut==='absent';}).length;
    var ret=sp.filter(function(p){return p.statut==='retard';}).length;
    var pct=Math.round(pres/(sp.length||1)*100);
    return '<tr><td><b>'+st.nom+'</b> '+st.prenom+'</td><td>'+st.classe+'</td><td style="color:var(--green);font-weight:600">'+pres+'</td><td style="color:var(--red);font-weight:600">'+abs+'</td><td style="color:var(--orange);font-weight:600">'+ret+'</td><td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><span style="font-size:12px;color:var(--text2)">'+pct+'%</span></div></td></tr>';
  }).join('');
  document.getElementById('mainContent').innerHTML =
    '<div class="section-head"><div class="page-title">Statistiques globales</div></div>' +
    '<div class="stats-grid">'+statCard(s.length,'Étudiants','blue',ICO.users)+statCard(getProfs().length,'Professeurs','blue',ICO.user)+statCard(POINTAGES.filter(function(p){return p.statut==='present'||p.statut==='retard';}).length,'Présences totales','green',ICO.check)+statCard(POINTAGES.filter(function(p){return p.statut==='absent';}).length,'Absences totales','red',ICO.xmark)+statCard(POINTAGES.filter(function(p){return p.statut==='retard';}).length,'Retards totaux','orange',ICO.warn)+'</div>' +
    '<div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">Bilan individuel par étudiant</div></div>' +
    '<table><thead><tr><th>Nom & Prénom</th><th>Classe</th><th>Présences</th><th>Absences</th><th>Retards</th><th>Taux présence</th></tr></thead>' +
    '<tbody>'+rows+'</tbody></table></div>';
}

// ── GESTION ──
function renderGestion() {
  var list = USERS.filter(function(u){ return u.role!=='admin'&&u.role!=='directeur'; })
    .filter(function(u){ return !gestSearch||(u.nom+' '+u.prenom+' '+u.matricule).toLowerCase().indexOf(gestSearch.toLowerCase())>=0; });
  var rows = list.map(function(u){
    return '<tr><td><b>'+u.nom+'</b> '+u.prenom+'</td><td class="mono" style="font-size:12px;color:var(--text2)">'+u.matricule+'</td><td style="font-size:12.5px;color:var(--text2)">'+u.email+'</td><td><span class="role-tag '+u.role+'">'+u.role+'</span></td><td>'+(u.classe||'—')+'</td>' +
      '<td><div style="display:flex;gap:6px"><button class="btn-sm btn-edit" onclick="openEditModal('+u.id+')">'+ICO.edit+' Éditer</button><button class="btn-sm btn-del" onclick="openDeleteModal('+u.id+')">'+ICO.trash+' Suppr.</button></div></td></tr>';
  }).join('');
  document.getElementById('mainContent').innerHTML =
    '<div class="section-head"><div class="page-title">Gestion des comptes</div><button class="btn-add" onclick="openAddModal()">'+ICO.plus+' Ajouter un compte</button></div>' +
    '<div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">Utilisateurs ('+list.length+')</div>' +
    '<input class="filter-inp" placeholder="Rechercher..." value="'+gestSearch+'" oninput="gestSearch=this.value;renderGestion()"/></div>' +
    '<table><thead><tr><th>Nom & Prénom</th><th>Matricule</th><th>Email</th><th>Rôle</th><th>Classe</th><th>Actions</th></tr></thead>' +
    '<tbody>'+(rows||'<tr><td colspan="6"><div class="empty">Aucun résultat</div></td></tr>')+'</tbody></table></div>';
}

// ── MON POINTAGE ──
function renderPointage() {
  var uid = currentUser.id;
  var p = getP(uid);
  var hasE=p?p.entree:null, hasS=p?p.sortie:null;
  var dotClass=hasE?(p.statut==='present'?'green':'orange'):'red';
  var statutTxt=p?(p.statut==='present'?'Présent ✓':p.statut==='retard'?'⚠ Retard':'Absent'):'Non pointé';
  var statusExtra='';
  if(hasE) statusExtra+='<div class="status-chip"><span class="chip-lbl">Entrée :</span><span class="chip-val">'+hasE+'</span></div>';
  if(hasS) statusExtra+='<div class="status-chip"><span class="chip-lbl">Sortie :</span><span class="chip-val">'+hasS+'</span></div>';
  document.getElementById('mainContent').innerHTML =
    '<div class="page-title" style="margin-bottom:22px">Mon pointage</div>' +
    '<div class="pointage-panel"><div class="pnl-title">⏱ Pointage du jour</div><div class="pnl-sub">'+fmtFull()+'</div>' +
    '<div class="pnl-btns">' +
      '<button class="btn-entree" '+(hasE?'disabled':'')+' onclick="doPointage(\'entree\')">' + ICO.check + ' ' + (hasE?'Entrée enregistrée ('+hasE+')':"Pointer l'entrée") + '</button>' +
      '<button class="btn-sortie" '+((!hasE||hasS)?'disabled':'')+' onclick="doPointage(\'sortie\')">' + ICO.xmark + ' ' + (hasS?'Sortie enregistrée ('+hasS+')':'Pointer la sortie') + '</button>' +
    '</div>' +
    '<div class="pnl-status"><div class="status-chip"><div class="dot '+dotClass+'"></div><span class="chip-lbl">Statut :</span><span class="chip-val">'+statutTxt+'</span></div>'+statusExtra+'</div></div>';
}

function doPointage(type) {
  try {
    var raw = localStorage.getItem('edupoint_pointages');
    if (raw) POINTAGES = JSON.parse(raw);
  } catch(e) {}
  var now=getNow(); var existing=getP(currentUser.id);
  if(type==='entree'){
    if(existing) { showToast('Entrée déjà enregistrée','error'); return; }
    var statut=getStatut(now);
    POINTAGES.push({id:Date.now(),userId:currentUser.id,date:getToday(),entree:now,sortie:null,statut:statut});
    showToast(statut==='present'?'Entrée pointée à '+now+' — À l\'heure ✓':'Entrée pointée à '+now+' — Retard ⚠');
  } else {
    if(!existing||existing.sortie) { showToast('Aucune entrée à clôturer','error'); return; }
    existing.sortie=now;
    showToast('Sortie pointée à '+now);
  }
  saveData(); render();
}

function saveNewUser() {
  var nom=document.getElementById('f_nom').value.trim();
  var prenom=document.getElementById('f_prenom').value.trim();
  var email=document.getElementById('f_email').value.trim();
  var mat=document.getElementById('f_mat').value.trim().toUpperCase();
  var pwd=document.getElementById('f_pwd').value;
  var role=document.getElementById('f_role').value;
  var classe=document.getElementById('f_classe').value.trim();
  if(!nom||!prenom||!email||!mat||!pwd){showToast('Tous les champs obligatoires sont requis','error');return;}
  // Vérifier que le matricule n'existe pas déjà
  if(USERS.find(function(u){return u.matricule===mat;})){showToast('Ce matricule existe déjà','error');return;}
  USERS.push({id:Date.now(),role:role,nom:nom,prenom:prenom,email:email,matricule:mat,password:pwd,classe:classe||null});
  saveData(); closeModal(); showToast(prenom+' '+nom+' ajouté(e) — Connexion : '+mat+' / '+pwd); render();
}

function saveEditUser(id) {
  var u=USERS.find(function(x){return x.id===id;});
  if(!u) return;
  u.prenom=document.getElementById('e_prenom').value.trim()||u.prenom;
  u.nom=document.getElementById('e_nom').value.trim()||u.nom;
  u.email=document.getElementById('e_email').value.trim()||u.email;
  u.matricule=document.getElementById('e_mat').value.trim()||u.matricule;
  var np=document.getElementById('e_pwd').value; if(np) u.password=np;
  u.role=document.getElementById('e_role').value;
  u.classe=document.getElementById('e_classe').value.trim()||null;
  saveData(); closeModal(); showToast(u.prenom+' '+u.nom+' modifié(e)'); render();
}

function openDeleteModal(id) {
  var u=USERS.find(function(x){return x.id===id;});

  openModal(
    '<div class="modal-title">🗑️ Supprimer</div>' +
    '<div class="modal-sub">Supprimer <b style="color:var(--white)">'+u.prenom+' '+u.nom+'</b> ('+u.matricule+') ?</div>' +
    '<p style="font-size:13px;color:var(--red);background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:8px;padding:10px 14px">⚠️ Action irréversible. Tous les pointages liés seront perdus.</p>' +
    '<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn-danger" onclick="confirmDelete('+id+')">Supprimer</button></div>'
  );

function confirmDelete(id) {
  var u=USERS.find(function(x){return x.id===id;});
  USERS=USERS.filter(function(x){return x.id!==id;});
  POINTAGES=POINTAGES.filter(function(p){return p.userId!==id;});
  saveData(); closeModal(); showToast((u?u.prenom+' '+u.nom:'Utilisateur')+' supprimé(e)','error'); render();
}

function saveFirebaseConfig() {
  var apiKey = document.getElementById('fb_apiKey').value.trim();
  var projectId = document.getElementById('fb_projectId').value.trim();
  var authDomain = document.getElementById('fb_authDomain').value.trim();
  var storageBucket = document.getElementById('fb_storageBucket').value.trim();
  var appId = document.getElementById('fb_appId').value.trim();
  if (!apiKey || !projectId) { showToast('API Key et Project ID requis', 'error'); return; }
  // Sauvegarder la config dans localStorage
  var newCfg = {apiKey:apiKey, authDomain:authDomain||projectId+'.firebaseapp.com', projectId:projectId, storageBucket:storageBucket||projectId+'.appspot.com', messagingSenderId:'', appId:appId};
  localStorage.setItem('edupoint_firebase_config', JSON.stringify(newCfg));
  // Mettre à jour la config en mémoire
  Object.assign(FIREBASE_CONFIG, newCfg);
  closeModal();
  showToast('Config Firebase sauvegardée — Rechargement...');
  setTimeout(function(){ window.location.reload(); }, 1500);
}

function clearFirebaseConfig() {
  localStorage.removeItem('edupoint_firebase_config');
  Object.assign(FIREBASE_CONFIG, {apiKey:'VOTRE_API_KEY',authDomain:'VOTRE_PROJECT.firebaseapp.com',projectId:'VOTRE_PROJECT_ID',storageBucket:'VOTRE_PROJECT.appspot.com',messagingSenderId:'',appId:'VOTRE_APP_ID'});
  closeModal();
  showToast('Config Firebase effacée — Mode localStorage');
  updateFbBadge();
}

function updateFbBadge() {
  var badge = document.getElementById('fbBadge');
  if (firebaseReady) {
    badge.className = 'firebase-badge connected';
    badge.textContent = '🔥 Firebase ✓';
  } else {
    badge.className = 'firebase-badge';
    badge.textContent = '🔥 Firebase';
  }
}

// ── EXPORT CSV ──
function exportCSV() {
  var headers = ['Nom','Prenom','Matricule','Classe','Date','Entree','Sortie','Statut'];
  var rows = [headers];
  getStudents().forEach(function(s){
    var p = getP(s.id, presFiltrDate);
    var statut = (p && p.statut) || 'absent';
    var statutFr = statut==='present' ? 'Present' : statut==='retard' ? 'Retard' : 'Absent';
    rows.push([s.nom, s.prenom, s.matricule, s.classe||'', presFiltrDate,
      (p&&p.entree)||'', (p&&p.sortie)||'', statutFr]);
  });
  var csv = '\uFEFF' + 'sep=;\n' + rows.map(function(r){
    return r.map(function(c){ return '"' + String(c).replace(/"/g, '""') + '"'; }).join(';');
  }).join('\r\n');
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'presences_' + presFiltrDate + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Export CSV téléchargé avec succès');
}

  try {
    var savedCfg = localStorage.getItem('edupoint_firebase_config');
    if (savedCfg) Object.assign(FIREBASE_CONFIG, JSON.parse(savedCfg));
  } catch(e) {}
})();

initFirebase();

render();
